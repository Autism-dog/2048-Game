<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="title-container">
                <h1 class="title">2048</h1>
                <div class="scores-container">
                    <div class="score-box">
                        <div class="score-label">分数</div>
                        <div id="score">0</div>
                    </div>
                    <div class="score-box">
                        <div class="score-label">最高分</div>
                        <div id="best-score">0</div>
                    </div>
                </div>
            </div>
            <div class="game-intro">
                <p>合并方块，挑战 <strong>2048</strong>！</p>
                <button id="restart-button">重新开始</button>
            </div>
        </header>

        <div class="game-container">
            <div id="game-message" class="game-message">
                <p></p>
                <div class="lower">
                    <a class="keep-playing-button">继续游戏</a>
                    <a class="retry-button">重试</a>
                </div>
            </div>

            <div class="grid-container">
                <!-- 背景网格 -->
                <div class="grid-row">
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                </div>
                <div class="grid-row">
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                </div>
                <div class="grid-row">
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                </div>
                <div class="grid-row">
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                </div>
            </div>

            <div id="tile-container" class="tile-container">
                <!-- 方块将通过 JS 动态生成 -->
            </div>
        </div>

        <div class="game-explanation">
            <p><strong>玩法：</strong> 使用 <strong>方向键</strong> 或 <strong>WASD</strong> 移动方块。移动时，两个数值相同的方块相撞会合并为一个。</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
